<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="todo-style.css">
    <title>To-Do List</title>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <input type="text" id="task-input" placeholder="Add new task...">
        <button id="add-task-btn">Add Task</button>
        <div id="task-counter">Tasks: 0</div>
        <ul id="task-list"></ul>
        <button id="theme-toggle">Toggle Dark/Light Theme</button>
    </div>
    <script src="todo-script.js"></script>
</body>
</html>
